global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: pizza-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8080"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
