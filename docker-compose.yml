services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8080}
    container_name: pizza-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pizza-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-pizza_user}:${POSTGRES_PASSWORD:-pizza_pass}@db:5432/${POSTGRES_DB:-pizza_db}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PIZZA_SEED_FILE: /app/data/api.json
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: pizza-db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pizza_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pizza_pass}
      POSTGRES_DB: ${POSTGRES_DB:-pizza_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  prometheus:
    image: prom/prometheus:v2.53.4
    container_name: pizza-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
      - node-exporter
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:11.0.0
    container_name: pizza-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: pizza-node-exporter
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
